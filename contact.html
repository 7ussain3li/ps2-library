<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; line-height: 1.8; margin: 0; background: radial-gradient(circle at top center, #001f3f, #0b0c10 80%); min-height: 100vh; color: #c9d1d9; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0b0c10; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }
        header { background: linear-gradient(135deg, #001f3f, #0b0c10); color: white; padding: 50px 20px; text-align: center; border-bottom: 2px solid #00f0ff; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2); }
        @keyframes neonTitle { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        header h1 { font-size: 2.8em; margin: 0; font-weight: 900; background: linear-gradient(90deg, #00f0ff, #fff, #ff00ea, #00f0ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: neonTitle 3s linear infinite; filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.5)); }
        nav { background: rgba(11, 12, 16, 0.9); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 240, 255, 0.3); }
        nav a { color: #ffffff; margin: 0 20px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: all 0.3s ease; text-transform: uppercase; padding: 5px 10px; border-radius: 5px; }
        nav a:hover { color: #00f0ff; text-shadow: 0 0 8px #00f0ff; background: rgba(0, 240, 255, 0.1); transform: translateY(-2px); }
        
        @keyframes pulseGlow { 0% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); } 50% { box-shadow: 0 0 40px rgba(255, 0, 234, 0.4); } 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); } }
        .form-container { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); padding: 50px; margin: 60px auto; max-width: 600px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(0, 240, 255, 0.3); position: relative; animation: pulseGlow 4s infinite alternate; }
        .form-container::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, #00f0ff, #ff00ea, #a100ff); z-index: -1; border-radius: 22px; opacity: 0.5; background-size: 200% 200%; animation: bgShift 5s ease infinite; }
        @keyframes bgShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes formFadeIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .form-container h2 { color: #00f0ff; text-align: center; margin-top: 0; font-size: 2.2em; margin-bottom: 15px; animation: formFadeIn 0.8s ease-out backwards 0.1s; }
        .form-container p { text-align: center; color: #8a9fc2; margin-bottom: 30px; font-size: 1.1em; animation: formFadeIn 0.8s ease-out backwards 0.2s; }
        form label:nth-of-type(1), form input:nth-of-type(1) { animation: formFadeIn 0.8s ease-out backwards 0.3s; }
        form label:nth-of-type(2), form input:nth-of-type(2) { animation: formFadeIn 0.8s ease-out backwards 0.4s; }
        form label:nth-of-type(3), form textarea { animation: formFadeIn 0.8s ease-out backwards 0.5s; }
        form button { animation: formFadeIn 0.8s ease-out backwards 0.6s; }
        form { display: flex; flex-direction: column; gap: 20px; }
        label { font-weight: bold; color: #c9d1d9; font-size: 1.1em; margin-bottom: -10px; }
        input, textarea { padding: 15px; font-size: 1em; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 3px solid #ff00ea; background: rgba(0, 0, 0, 0.6); color: #fff; font-family: inherit; transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        input:focus, textarea:focus { outline: none; border-color: #00f0ff; border-bottom: 3px solid #00f0ff; background: rgba(0, 240, 255, 0.05); box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 2px 5px rgba(0,0,0,0.8); transform: translateY(-2px); }
        button { background: linear-gradient(45deg, #ff00ea, #00f0ff); color: #000; border: none; padding: 15px; font-size: 1.3em; border-radius: 8px; cursor: pointer; font-weight: 900; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; margin-top: 15px; box-shadow: 0 10px 20px rgba(255, 0, 234, 0.4); }
        button:hover { background: linear-gradient(45deg, #00f0ff, #ff00ea); transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0, 240, 255, 0.6); color: #fff; letter-spacing: 2px; }
        footer { text-align: center; padding: 30px; background: #010409; color: #8b949e; border-top: 1px solid #30363d; margin-top: 50px; font-size: 0.9em; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <h1>تواصل معنا</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="games.html">مكتبة الألعاب</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>

    <div class="form-container">
        <h2>شاركنا ذكرياتك واقتراحاتك!</h2>
        <p>عالم ألعاب الـ PS2 مليء بالتحف الفنية، وهناك دائماً ألعاب تستحق أن تُضاف إلى مكتبتنا. هل لديك لعبة مفضلة أو ملف تحديث (Patch) تود مشاركته معنا؟ املأ النموذج أدناه.</p>
        
        <form id="contactForm">
            <label>الاسم الكريم:</label>
            <input type="text" id="name" placeholder="أدخل اسمك هنا" required>
            
            <label>اسم اللعبة أو الإضافة المقترحة:</label>
            <input type="text" id="game" placeholder="مثال: Need for Speed" required>

            <label>لماذا تقترح هذه اللعبة؟</label>
            <textarea id="reason" rows="4" placeholder="شاركنا رأيك أو ذكرياتك مع اللعبة..." required></textarea>
            
            <button type="submit">إرسال الاقتراح</button>
        </form>
    </div>

    <footer>
        <p>تم تصميم هذا الموقع كمشروع أكاديمي | تطوير: حسين</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault(); // منع الإرسال الافتراضي للنموذج
            
            const name = document.getElementById('name').value;
            const game = document.getElementById('game').value;
            const reason = document.getElementById('reason').value;

            const subject = 'اقتراح لعبة جديدة لموسوعة PS2: ' + game;
            const body = 'الاسم الكريم: ' + name + '\n' +
                         'اسم اللعبة: ' + game + '\n\n' +
                         'سبب الاقتراح:\n' + reason;

            // ترميز النص لتجنب مشكلة الرموز الغريبة في اللغة العربية
            const mailtoLink = 'mailto:0771hussain19@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
            
            window.location.href = mailtoLink;
        });
    </script>
</body>
</html>
